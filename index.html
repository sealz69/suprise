<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Surpriz!!!</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Pacifico&display=swap" rel="stylesheet">
  <style>
    :root {
      --teal-light: #E0F2F1;
      --teal-main: #4DD0E1;
      --teal-dark: #00838F;
      --cream: #FFFDF7;
      --caramel: #D4A373;
      --text-main: #5D6D7E;
      --message-opacity: 0.5;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      font-family: 'Nunito', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      color: var(--text-main);
      background: url('https://usagif.com/wp-content/uploads/gify/cinnamoroll-above-the-clouds-usagif.gif') center/cover no-repeat fixed;
      padding: 2vw;
      overflow: hidden;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(3px);
      z-index: -1;
      pointer-events: none;
    }
    .glass-box {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 2rem;
      padding: 3rem 2.5rem;
      box-shadow: 0 8px 32px rgba(77, 208, 225, 0.3);
      border: 2px solid rgba(255, 255, 255, 0.8);
      max-width: 450px;
      width: 90%;
    }
    #countdownScreen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
      z-index: 10000;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
    }
    .countdown-title {
      font-family: 'Pacifico', cursive;
      font-size: clamp(1.8rem, 8vw, 2.5rem);
      color: var(--teal-dark);
      margin-bottom: 1rem;
    }
    #countdown {
      font-size: clamp(2rem, 10vw, 2.8rem);
      font-weight: 900;
      color: var(--caramel);
      text-shadow: 2px 2px 0px rgba(255,255,255,0.8);
    }
    #passwordScreen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(224, 242, 241, 0.85);
      backdrop-filter: blur(10px);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
    }
    .password-title {
      font-family: 'Pacifico', cursive;
      font-size: clamp(1.6rem, 7vw, 2.2rem);
      color: var(--teal-dark);
      margin-bottom: 0.5rem;
    }
    .password-subtitle {
      font-size: clamp(1rem, 4vw, 1.2rem);
      color: var(--text-main);
      font-weight: 700;
      margin-bottom: 1.5rem;
    }
    #passwordInput {
      width: 100%;
      padding: 16px 24px;
      font-size: clamp(1rem, 4vw, 1.2rem);
      border: 3px solid var(--teal-main);
      border-radius: 50px;
      text-align: center;
      margin-bottom: 1.5rem;
      outline: none;
      background: rgba(255,255,255,0.9);
      color: var(--teal-dark);
      transition: all 0.3s;
      font-weight: 700;
    }
    #passwordInput:focus {
      transform: scale(1.02);
      box-shadow: 0 0 0 6px rgba(77,208,225,0.3);
    }
    #unlockBtn {
      background: var(--caramel);
      color: white;
      border: none;
      padding: 16px 40px;
      font-size: clamp(1rem, 4vw, 1.2rem);
      font-weight: 800;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(212,163,115,0.4);
      transition: 0.3s;
    }
    #unlockBtn:hover {
      transform: translateY(-5px) scale(1.05);
      background: #c38c5b;
    }
    #errorMsg {
      color: #E74C3C;
      font-weight: 700;
      min-height: 28px;
      margin-top: 1rem;
    }
    h1 {
      font-family: 'Pacifico', cursive;
      font-size: clamp(2rem, 8vw, 4.5vw);
      color: var(--teal-dark);
      text-shadow: 2px 2px 4px rgba(255,255,255,0.8);
      margin-bottom: 3vh;
      z-index: 10;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    #surpriseBtn {
      padding: 1.5vh 3vw;
      font-size: clamp(1.2rem, 5vw, 1.5rem);
      font-family: 'Nunito', sans-serif;
      border: none;
      border-radius: 50px;
      background: var(--teal-main);
      color: white;
      cursor: pointer;
      font-weight: 800;
      box-shadow: 0 4px 15px rgba(77,208,225,0.5);
      transition: 0.3s;
      z-index: 10;
      margin-bottom: 3vh;
    }
    #surpriseBtn:hover {
      transform: translateY(-5px) scale(1.1);
      background: var(--teal-dark);
    }
    #message {
      display: none;
      font-size: clamp(1rem, 4vw, 1.5rem);
      max-width: 800px;
      width: 90%;
      font-weight: 700;
      color: var(--teal-dark);
      line-height: 1.5;
      z-index: 10;
      white-space: pre-wrap;
      padding: 1.2rem 1.8rem;
      background: rgba(255,255,255, var(--message-opacity));
      backdrop-filter: blur(10px);
      border-radius: 20px;
      border: 2px solid white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }
    /* Game container styles - compact and responsive */
    #gameContainer {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(145deg, #0b7a7a 0%, #2aa3a3 100%);
      z-index: 10001;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 12px;
    }
    .game-card {
      background: rgba(220, 255, 255, 0.45);
      backdrop-filter: blur(8px);
      border-radius: 32px;
      padding: 16px 16px 20px;
      box-shadow: 0 20px 40px rgba(0, 80, 80, 0.3);
      border: 2px solid #b3ecec;
      max-width: 550px;
      width: 100%;
    }
    .game-title {
      font-family: 'Pacifico', cursive;
      font-size: clamp(1.4rem, 6vw, 1.8rem);
      color: #e0f7fa;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .game-title span {
      background: #c6f5f5;
      padding: 4px 12px;
      border-radius: 60px;
      font-size: clamp(0.8rem, 3.5vw, 1rem);
      box-shadow: inset 0 2px 5px #a6d6d6, 0 4px 0 #2a8a8a;
      color: #0b4f4f;
    }
    #gameCanvas {
      display: block;
      margin: 0 auto;
      width: 100%;
      height: auto;
      aspect-ratio: 1/1;
      background: #8ed6d6;
      background-image: radial-gradient(circle at 30% 25%, #b0e6e6 0%, #5ebdbd 100%);
      border-radius: 24px;
      box-shadow: inset 0 0 0 2px #d6ffff, 0 8px 0 #307a7a, 0 10px 15px rgba(0,60,60,0.25);
      border: 2px solid #e2ffff;
      cursor: grab;
      touch-action: none;
    }
    .stats-panel {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 8px;
      margin: 12px 4px 8px;
    }
    .stat-box {
      background: #d9f6f6;
      padding: 6px 12px;
      border-radius: 30px;
      font-size: clamp(0.8rem, 3.5vw, 1rem);
      font-weight: 700;
      color: #005f5f;
      box-shadow: inset 0 2px 4px #b2e0e0, 0 3px 0 #1f7a7a;
      border: 1px solid #aaf0f0;
      flex: 1 1 auto;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .heart-icon {
      font-size: 1.2rem;
      letter-spacing: 2px;
    }
    .game-buttons {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin: 8px 0;
      flex-wrap: wrap;
    }
    .game-btn {
      background: #6fd9d9;
      border: none;
      border-bottom: 4px solid #2b8a8a;
      font-size: clamp(0.8rem, 3.5vw, 0.95rem);
      font-weight: bold;
      padding: 8px 16px;
      border-radius: 40px;
      color: #023b3b;
      box-shadow: 0 4px 0 #1d6b6b, 0 4px 10px rgba(0,100,100,0.2);
      cursor: pointer;
      transition: all 0.05s;
      font-family: inherit;
      border: 1px solid #bef7f7;
      flex: 1 1 120px;
    }
    .game-btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #1d6b6b, 0 4px 10px rgba(0,100,100,0.15);
      border-bottom-width: 2px;
    }
    .hint {
      text-align: center;
      color: #c2f0f0;
      margin-top: 6px;
      font-weight: 600;
      font-size: clamp(0.7rem, 3vw, 0.9rem);
    }
    #luajBtn {
      background: var(--caramel);
      color: white;
      border: none;
      padding: 10px 28px;
      font-size: clamp(1rem, 4vw, 1.2rem);
      font-weight: 800;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(212,163,115,0.4);
      transition: 0.3s;
      margin-top: 8px;
    }
    #luajBtn:hover {
      transform: translateY(-3px) scale(1.05);
      background: #c38c5b;
    }

    @media (max-width: 480px) {
      body { padding: 1.5vw; }
      #message { padding: 1rem 1.2rem; width: 95%; }
      .stats-panel { flex-direction: column; gap: 5px; }
      .stat-box { width: 100%; }
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }
  </style>
</head>
<body>
  <div id="countdownScreen">
    <div class="glass-box">
      <div class="countdown-title">Hapet me 16 Prill</div>
      <div id="countdown"></div>
    </div>
  </div>
  <div id="passwordScreen">
    <div class="glass-box">
      <div class="password-title">Gëzuar Ditëlindjen Eli!</div>
      <div class="password-subtitle">Fut fjalëkalimin</div>
      <input id="passwordInput" type="password" placeholder="Shkruaj këtu..." autocomplete="off">
      <button id="unlockBtn">Hap Surprizën!</button>
      <p id="errorMsg"></p>
      <small style="margin-top:1.5rem; display:block; color:var(--teal-dark); font-weight:700;">
         Hint: Ëmbëlsira jote e preferuar
      </small>
    </div>
  </div>

  <h1>Gëzuar Ditëlindjen Eliii!</h1>
  <button id="surpriseBtn">Kliko për Surprizën</button>
  <div id="message">
    <p id="typed"></p>
    <div style="text-align: center;">
      <button id="luajBtn" style="display:none;">Luaj</button>
    </div>
  </div>

  <!-- Game container with BUCKET & RAINING CINNAMOROLLS (3 LIVES) -->
  <div id="gameContainer">
    <div class="game-card">
      <div class="game-title">
         Kap Cinnamoroll
      </div>
      <canvas id="gameCanvas" width="500" height="500"></canvas>
      <div class="stats-panel">
        <div class="stat-box">Të kapur: <span id="scoreDisplay">0</span></div>
        <div class="stat-box">Jet: <span id="livesDisplay">❤️❤️❤️</span></div>
      </div>
      <div class="game-buttons">
        <button class="game-btn" id="resetGameBtn">🔄 Rifillo lojën</button>
        <button class="game-btn" id="backBtn">⬅️ Kthehu</button>
      </div>
      <div class="hint"></div>
    </div>
  </div>

  <audio id="music" loop preload="auto">
    <source src="song.mp3" type="audio/mpeg">
    Shfletuesi yt nuk e mbështet audio-n.
  </audio>

  <script>
    (function() {
      // ---------- BIRTHDAY WEBSITE LOGIC (countdown, password, message, music) ----------
      const correctPassword = "trilece";
      const passwordScreen = document.getElementById('passwordScreen');
      const passwordInput = document.getElementById('passwordInput');
      const errorMsg = document.getElementById('errorMsg');
      const unlockBtn = document.getElementById('unlockBtn');
      const music = document.getElementById('music');
      const btn = document.getElementById("surpriseBtn");
      const messageDiv = document.getElementById("message");
      const typed = document.getElementById("typed");
      const countdownScreen = document.getElementById("countdownScreen");
      const countdownEl = document.getElementById("countdown");
      const luajBtn = document.getElementById('luajBtn');

      let musicFadeInterval = null;
      let musicPlaying = false;
      let musicLoadFailed = false;
      let countdownFinished = false;

      music.addEventListener('error', () => { musicLoadFailed = true; });

      function checkPassword() {
        const input = passwordInput.value.trim().toLowerCase();
        if (input === correctPassword) {
          passwordScreen.style.display = 'none';
          startMusic();
        } else {
          errorMsg.textContent = "Fjalëkalim i gabuar!";
          const box = passwordScreen.querySelector('.glass-box');
          box.style.animation = 'shake 0.4s';
          setTimeout(() => box.style.animation = '', 400);
        }
      }
      unlockBtn.addEventListener('click', checkPassword);
      passwordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') checkPassword(); });

      function startMusic() {
        if (musicPlaying || musicLoadFailed) return;
        music.volume = 0;
        music.play().then(() => {
          musicPlaying = true;
          let vol = 0;
          if (musicFadeInterval) clearInterval(musicFadeInterval);
          musicFadeInterval = setInterval(() => {
            vol += 0.08;
            if (vol >= 1) { vol = 1; clearInterval(musicFadeInterval); musicFadeInterval = null; }
            music.volume = vol;
          }, 80);
        }).catch(() => { musicLoadFailed = true; });
      }

      const fullText = 'Të uroj gjithë të mirat në ditëlindjen tënde dhe shpresoj që po ja kalon mirë! \n\nDoja të të thoja që ke qenë shoqja ime më e mirë në botë dhe dua të të them sa shumë do të thotë për mua. Të dua shumë dhe jam shumë me fat që të kam në jetën time, dhe faleminderit që më ke mbështetur kudo dhe çdo herë. \n\nShpresoj që të jemi sa më mirë!!!';
      let index = 0;
      let typingFinished = false;
      
      function typeWriter() {
        if (index < fullText.length) {
          if (fullText.charAt(index) === '\n') typed.innerHTML += '<br>';
          else typed.innerHTML += fullText.charAt(index);
          index++;
          setTimeout(typeWriter, 50);
        } else {
          typingFinished = true;
          luajBtn.style.display = 'inline-block';
          luajBtn.style.animation = 'float 1.5s ease-in-out infinite';
        }
      }

      btn.addEventListener('click', () => {
        btn.style.display = "none";
        messageDiv.style.display = "block";
        typed.innerHTML = '';
        index = 0;
        typingFinished = false;
        luajBtn.style.display = 'none';
        luajBtn.style.animation = '';
        typeWriter();
        if (!musicPlaying && !musicLoadFailed) startMusic();
      });

      function getTargetDate() {
        const now = new Date();
        const target = new Date(now.getFullYear(), 3, 16);
        target.setHours(0, 0, 0, 0);
        return target;
      }
      const target = getTargetDate();
      function updateCountdown() {
        const now = new Date();
        const diff = target - now;
        if (diff <= 0) {
          if (!countdownFinished) {
            countdownScreen.style.display = "none";
            passwordScreen.style.display = 'flex';
            countdownFinished = true;
          }
          return;
        }
        const d = Math.floor(diff / (1000 * 60 * 60 * 24));
        const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const m = Math.floor((diff / (1000 * 60)) % 60);
        const s = Math.floor((diff / 1000) % 60);
        countdownEl.innerHTML = `${d}d ${h}h ${m}m ${s}s`;
      }
      window.addEventListener('load', () => {
        passwordScreen.style.display = 'none';
        countdownScreen.style.display = 'flex';
        updateCountdown();
        setInterval(updateCountdown, 1000);
      });

      // ---------- NEW GAME: CATCH RAINING CINNAMOROLLS WITH BUCKET & 3 LIVES ----------
      const gameContainer = document.getElementById('gameContainer');
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      const scoreSpan = document.getElementById('scoreDisplay');
      const livesSpan = document.getElementById('livesDisplay');

      // Game dimensions
      let canvasWidth = 500, canvasHeight = 500;
      canvas.width = canvasWidth;
      canvas.height = canvasHeight;

      // Bucket settings
      const BUCKET_WIDTH = 90;
      const BUCKET_HEIGHT = 32;
      const BUCKET_Y = canvasHeight - BUCKET_HEIGHT - 10;
      let bucketX = (canvasWidth / 2) - (BUCKET_WIDTH / 2);

      // Falling Cinnamorolls
      let cinnamorolls = [];
      const BASE_FALL_SPEED = 140;     // pixels per second
      const SPEED_VARIATION = 40;
      const CINNA_RADIUS = 24;          // a bit smaller for 500px canvas

      // Game state
      let caughtCount = 0;
      let lives = 3;
      let gameActive = false;            // becomes true when game starts
      let animationId = null;
      let spawnTimeout = null;
      let lastTimestamp = 0;

      // UI update
      function updateUI() {
        scoreSpan.innerText = caughtCount;
        let hearts = "";
        for (let i = 0; i < lives; i++) hearts += "❤️ ";
        for (let i = lives; i < 3; i++) hearts += "🖤 ";
        livesSpan.innerText = hearts.trim() || "💔";
      }

      // Draw cute Cinnamoroll (simplified but adorable)
      function drawCinnamoroll(x, y, r) {
        ctx.save();
        ctx.shadowBlur = 6;
        ctx.shadowColor = "#5f9e9e";
        // body
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = "#FFFEF5";
        ctx.fill();
        ctx.strokeStyle = "#FFD9E6";
        ctx.lineWidth = 1.5;
        ctx.stroke();
        // ears
        ctx.beginPath();
        ctx.ellipse(x - r*0.6, y - r*0.75, r*0.45, r*0.7, -0.35, 0, Math.PI*2);
        ctx.fillStyle = "#FFF5EB";
        ctx.fill();
        ctx.stroke();
        ctx.beginPath();
        ctx.ellipse(x + r*0.6, y - r*0.75, r*0.45, r*0.7, 0.35, 0, Math.PI*2);
        ctx.fill();
        ctx.stroke();
        // inner ears
        ctx.fillStyle = "#FFC2D4";
        ctx.beginPath();
        ctx.ellipse(x - r*0.55, y - r*0.65, r*0.25, r*0.45, -0.3, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(x + r*0.55, y - r*0.65, r*0.25, r*0.45, 0.3, 0, Math.PI*2);
        ctx.fill();
        // eyes
        ctx.fillStyle = "#5D9BEC";
        ctx.beginPath();
        ctx.arc(x - r*0.35, y - r*0.1, r*0.16, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(x + r*0.35, y - r*0.1, r*0.16, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(x - r*0.42, y - r*0.18, r*0.05, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(x + r*0.28, y - r*0.18, r*0.05, 0, Math.PI*2);
        ctx.fill();
        // blush & smile
        ctx.fillStyle = "#FFA9C4";
        ctx.beginPath();
        ctx.ellipse(x - r*0.5, y + r*0.1, r*0.12, r*0.08, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(x + r*0.5, y + r*0.1, r*0.12, r*0.08, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(x, y + r*0.18, r*0.08, 0.05, Math.PI - 0.05);
        ctx.strokeStyle = "#CB6E8E";
        ctx.lineWidth = 1.8;
        ctx.stroke();
        ctx.restore();
      }

      function drawBucket(x, y, w, h) {
        ctx.save();
        ctx.shadowBlur = 3;
        ctx.shadowColor = "rgba(0,0,0,0.2)";
        ctx.beginPath();
        ctx.roundRect(x, y, w, h, 10);
        ctx.fillStyle = "#E7B874";
        ctx.fill();
        ctx.strokeStyle = "#B97F44";
        ctx.lineWidth = 2;
        ctx.stroke();
        // wood planks
        ctx.beginPath();
        ctx.moveTo(x+8, y); ctx.lineTo(x+8, y+h);
        ctx.moveTo(x+w-8, y); ctx.lineTo(x+w-8, y+h);
        ctx.moveTo(x+w/2, y); ctx.lineTo(x+w/2, y+h);
        ctx.strokeStyle = "#C2894A";
        ctx.stroke();
        // rim
        ctx.fillStyle = "#CFA05C";
        ctx.fillRect(x-2, y-4, w+4, 6);
        ctx.fillStyle = "#B07D42";
        ctx.fillRect(x-1, y-3, w+2, 4);
        // handle
        ctx.beginPath();
        ctx.ellipse(x+w/2, y-10, w*0.3, 10, 0, 0, Math.PI*2);
        ctx.strokeStyle = "#A56B2F";
        ctx.lineWidth = 2.5;
        ctx.stroke();
        ctx.restore();
      }

      // roundRect helper
      if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
          if (w < 2*r) r = w/2;
          if (h < 2*r) r = h/2;
          this.moveTo(x+r, y);
          this.lineTo(x+w-r, y);
          this.quadraticCurveTo(x+w, y, x+w, y+r);
          this.lineTo(x+w, y+h-r);
          this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
          this.lineTo(x+r, y+h);
          this.quadraticCurveTo(x, y+h, x, y+h-r);
          this.lineTo(x, y+r);
          this.quadraticCurveTo(x, y, x+r, y);
          return this;
        };
      }

      function isCollision(circle, rectX, rectY, rectW, rectH) {
        const closestX = Math.max(rectX, Math.min(circle.x, rectX + rectW));
        const closestY = Math.max(rectY, Math.min(circle.y, rectY + rectH));
        const dx = circle.x - closestX;
        const dy = circle.y - closestY;
        return Math.sqrt(dx*dx + dy*dy) < circle.radius;
      }

      function addCinnamoroll() {
        if (!gameActive) return;
        const randX = CINNA_RADIUS + Math.random() * (canvasWidth - CINNA_RADIUS * 2);
        let fallSpeed = BASE_FALL_SPEED + (Math.random() - 0.5) * SPEED_VARIATION * 2;
        fallSpeed = Math.min(240, Math.max(120, fallSpeed));
        cinnamorolls.push({
          x: randX,
          y: -CINNA_RADIUS,
          radius: CINNA_RADIUS,
          speedPxPerSec: fallSpeed
        });
      }

      function scheduleSpawn() {
        if (!gameActive) return;
        if (spawnTimeout) clearTimeout(spawnTimeout);
        const delay = 700 + Math.random() * 800;
        spawnTimeout = setTimeout(() => {
          if (gameActive) {
            addCinnamoroll();
            scheduleSpawn();
          }
        }, delay);
      }

      function loseLife() {
        if (!gameActive) return;
        lives--;
        updateUI();
        if (lives <= 0) {
          lives = 0;
          updateUI();
          gameActive = false;
          if (spawnTimeout) clearTimeout(spawnTimeout);
        } else {
          // shake effect
          livesSpan.style.transform = "scale(1.1)";
          setTimeout(() => { if(livesSpan) livesSpan.style.transform = ""; }, 200);
        }
      }

      function updateGame(deltaSec) {
        if (!gameActive) return;
        if (deltaSec > 0.035) deltaSec = 0.035;
        // move
        for (let c of cinnamorolls) c.y += c.speedPxPerSec * deltaSec;
        const bucketRect = { x: bucketX, y: BUCKET_Y, w: BUCKET_WIDTH, h: BUCKET_HEIGHT };
        const remaining = [];
        for (let c of cinnamorolls) {
          if (isCollision(c, bucketRect.x, bucketRect.y, bucketRect.w, bucketRect.h)) {
            caughtCount++;
            updateUI();
            continue;
          }
          if (c.y + c.radius > canvasHeight) {
            loseLife();
            continue;
          }
          remaining.push(c);
        }
        cinnamorolls = remaining;
      }

      function drawScene() {
        ctx.clearRect(0, 0, canvasWidth, canvasHeight);
        // sky gradient
        const grad = ctx.createLinearGradient(0, 0, 0, canvasHeight);
        grad.addColorStop(0, "#b0e6e6");
        grad.addColorStop(1, "#7acccc");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvasWidth, canvasHeight);
        // clouds
        ctx.fillStyle = "#FFF9F0CC";
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.ellipse(70, 50, 40, 35, 0, 0, Math.PI*2);
        ctx.ellipse(120, 60, 48, 38, 0, 0, Math.PI*2);
        ctx.ellipse(30, 70, 38, 32, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(430, 80, 45, 38, 0, 0, Math.PI*2);
        ctx.ellipse(470, 65, 40, 33, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;
        // draw falling cinnas
        for (let c of cinnamorolls) drawCinnamoroll(c.x, c.y, c.radius);
        drawBucket(bucketX, BUCKET_Y, BUCKET_WIDTH, BUCKET_HEIGHT);
        // game over overlay
        if (!gameActive && lives === 0) {
          ctx.font = "bold 24px 'Nunito'";
          ctx.fillStyle = "#c4456ecc";
          ctx.shadowBlur = 0;
          ctx.fillText("💔 GAME OVER 💔", canvasWidth/2-110, canvasHeight/2-30);
          ctx.font = "16px 'Nunito'";
          ctx.fillStyle = "#aa5577";
          ctx.fillText("Shtyp 'Rifillo lojën'", canvasWidth/2-95, canvasHeight/2+20);
        }
      }

      function gameLoop(nowMs) {
        if (!gameActive && lives === 0) {
          drawScene();
          animationId = requestAnimationFrame(gameLoop);
          return;
        }
        if (!lastTimestamp) { lastTimestamp = nowMs; drawScene(); animationId = requestAnimationFrame(gameLoop); return; }
        let delta = Math.min(0.033, (nowMs - lastTimestamp) / 1000);
        if (delta > 0.002 && gameActive) updateGame(delta);
        drawScene();
        lastTimestamp = nowMs;
        animationId = requestAnimationFrame(gameLoop);
      }

      function startGame() {
        if (animationId) cancelAnimationFrame(animationId);
        if (spawnTimeout) clearTimeout(spawnTimeout);
        // reset state
        cinnamorolls = [];
        caughtCount = 0;
        lives = 3;
        gameActive = true;
        updateUI();
        bucketX = (canvasWidth / 2) - (BUCKET_WIDTH / 2);
        lastTimestamp = 0;
        scheduleSpawn();
        animationId = requestAnimationFrame(gameLoop);
      }

      function stopGameAndReset() {
        gameActive = false;
        if (spawnTimeout) clearTimeout(spawnTimeout);
        if (animationId) cancelAnimationFrame(animationId);
        animationId = null;
        cinnamorolls = [];
      }

      // Event handlers for bucket movement
      function updateBucketPosition(clientX) {
        if (!gameActive) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        let canvasX = (clientX - rect.left) * scaleX;
        canvasX = Math.min(Math.max(canvasX, 0), canvasWidth);
        let newX = canvasX - (BUCKET_WIDTH / 2);
        newX = Math.min(Math.max(newX, 0), canvasWidth - BUCKET_WIDTH);
        bucketX = newX;
      }
      function onMouseMove(e) { updateBucketPosition(e.clientX); }
      function onTouchMove(e) { e.preventDefault(); if(e.touches.length) updateBucketPosition(e.touches[0].clientX); }
      function onTouchStart(e) { e.preventDefault(); if(e.touches.length) updateBucketPosition(e.touches[0].clientX); }

      // UI buttons integration
      function showGame() {
        document.querySelector('h1').style.display = 'none';
        btn.style.display = 'none';
        messageDiv.style.display = 'none';
        gameContainer.style.display = 'flex';
        startGame();
      }
      function hideGame() {
        stopGameAndReset();
        gameContainer.style.display = 'none';
        if (passwordScreen.style.display !== 'flex' && countdownScreen.style.display !== 'flex') {
          document.querySelector('h1').style.display = 'block';
          if (typingFinished) { messageDiv.style.display = 'block'; luajBtn.style.display = 'inline-block'; }
          else { btn.style.display = 'block'; }
        }
      }
      document.getElementById('resetGameBtn').addEventListener('click', () => { stopGameAndReset(); startGame(); });
      document.getElementById('backBtn').addEventListener('click', hideGame);
      luajBtn.addEventListener('click', showGame);

      canvas.addEventListener('mousemove', onMouseMove);
      canvas.addEventListener('touchmove', onTouchMove, { passive: false });
      canvas.addEventListener('touchstart', onTouchStart, { passive: false });
      canvas.addEventListener('contextmenu', (e) => e.preventDefault());

      // initial draw (idle)
      startGame();  // will be active only after showing container, but we stop it on hide
      hideGame();   // start hidden, but game loop stops
    })();
  </script>
</body>
</html>
