<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gëzuar Ditëlindjen Eliii! 🎉</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Orbitron:wght@500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      max-height: 100vh;
      font-family: 'Orbitron', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      color: #0f2a20;
      background: url('https://usagif.com/wp-content/uploads/gify/cinnamoroll-above-the-clouds-usagif.gif') center/cover no-repeat fixed;
      padding: 2vw;
      overflow: hidden; /* No scrolling ever */
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(44, 155, 110, 0.35);
      z-index: -1;
      pointer-events: none;
    }

    /* PASSWORD SCREEN */
    #passwordScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 42, 32, 0.92);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 2rem;
      text-align: center;
      transition: all 0.6s ease;
    }
    .password-box {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(16px);
      border-radius: 3rem;
      padding: 3rem 2.5rem;
      box-shadow: 0 0 4vw #51ffba;
      max-width: 420px;
      width: 90%;
      border: 5px solid #51ffba;
    }
    .password-title {
      font-size: 1.5rem;
      color: #51ffba;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 2vw #2c9b6e;
    }
    .password-subtitle {
      font-size: 1.2rem;
      color: #c8ffdd;
      font-weight: 600;
      margin-bottom: 1.5rem;
    }
    #passwordInput {
      width: 100%;
      padding: 18px 24px;
      font-size: 1.4rem;
      border: 4px solid #51ffba;
      border-radius: 60px;
      text-align: center;
      margin-bottom: 1rem;
      outline: none;
      background: rgba(255,255,255,0.15);
      color: white;
      transition: all 0.3s;
    }
    #passwordInput:focus {
      transform: scale(1.05);
      box-shadow: 0 0 0 8px rgba(81, 255, 186, 0.4);
    }
    #unlockBtn {
      background: #2c9b6e;
      color: white;
      border: none;
      padding: 16px 50px;
      font-size: 1.3rem;
      font-weight: 700;
      border-radius: 60px;
      cursor: pointer;
      box-shadow: 0 0 3vw #51ffba;
      transition: 0.4s;
    }
    #unlockBtn:hover {
      transform: scale(1.15);
      background: #51ffba;
      color: #0f2a20;
    }
    #errorMsg {
      color: #ff6666;
      font-weight: 600;
      min-height: 28px;
      margin-top: 1rem;
    }

    /* TITLE */
    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 5vw; /* smaller font */
      color: #2c9b6e;
      text-shadow: 0 0 1.5vw #000000, 0 0 3vw #000000;
      margin-bottom: 2.5vh;
      animation: glow 2s infinite alternate;
      z-index: 10;
      line-height: 1.1;
    }
    @keyframes glow {
      from { transform: scale(1); }
      to { transform: scale(1.05); }
    }

    /* SURPRISE BUTTON */
    #surpriseBtn {
      padding: 1.5vh 4vw; /* smaller padding */
      font-size: 3.5vw; /* smaller font */
      border: none;
      border-radius: 50px;
      background: #2c9b6e;
      color: white;
      cursor: pointer;
      font-weight: 600;
      box-shadow: 0 0 2vw #51ffba;
      transition: 0.4s;
      z-index: 10;
      margin-bottom: 3vh;
    }
    #surpriseBtn:hover {
      transform: scale(1.2);
      box-shadow: 0 0 5vw #51ffba;
    }

    /* MESSAGE (typewriter) */
    #message {
      display: none;
      font-size: 2.5vw; /* smaller font */
      max-width: 92%;
      font-weight: 600;
      color: #0f2a20;
      font-family: 'Orbitron', sans-serif;
      text-shadow: 0 0 0.7vw #51ffba;
      line-height: 1.45;
      z-index: 10;
      white-space: pre-wrap;
      padding: 0 3vw;
    }

    /* === COUNTDOWN WITH BLACK BACKGROUND (only thing added) === */
    #countdownScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      z-index: 10000;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
    }
    .countdown-box {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(16px);
      border-radius: 3rem;
      padding: 3rem 2.5rem;
      box-shadow: 0 0 4vw #51ffba;
      max-width: 520px;
      width: 90%;
      border: 5px solid #51ffba;
    }
    .countdown-title {
      font-size: 2rem;
      color: #51ffba;
      margin-bottom: 1.5rem;
      text-shadow: 0 0 2vw #2c9b6e;
      line-height: 1.3;
    }
    #countdown {
      font-size: 2.8rem;
      font-weight: 700;
      color: #51ffba;
      text-shadow: 0 0 15px #51ffba, 0 0 30px #2c9b6e;
    }

    /* Media Queries */
    @media (max-width: 1200px) {
      h1 { font-size: 6.5vw; }
      #message { font-size: 3vw; }
      #surpriseBtn { font-size: 4.5vw; padding: 1.8vh 5vw; }
    }
    @media (max-width: 768px) {
      h1 { font-size: 8vw; }
      #message { font-size: 3.5vw; }
      #surpriseBtn { font-size: 5vw; padding: 2vh 5.5vw; }
    }
    @media (max-width: 480px) {
      h1 { font-size: 9.5vw; }
      #message { font-size: 4vw; }
      #surpriseBtn { font-size: 6vw; padding: 2.2vh 6vw; }
    }
  </style>
</head>
<body>

  <!-- COUNTDOWN SCREEN (black background) -->
  <div id="countdownScreen">
    <div class="countdown-box">
      <div class="countdown-title">
        ⏳ Hapet më 16 Prill 🎉<br>
        Pak durim... surpriza po vjen 💚
      </div>
      <div id="countdown"></div>
    </div>
  </div>

  <!-- PASSWORD SCREEN -->
  <div id="passwordScreen">
    <div class="password-box">
      <div class="password-title">HAPPY BIRTHDAY ELI!</div>
      <div class="password-subtitle">Fut fjalekalimin</div>
      
      <input 
        id="passwordInput" 
        type="password" 
        placeholder="Fjalëkalimi..."
        autocomplete="off">
      
      <button id="unlockBtn" onclick="checkPassword()">Hap Ditëlindjen! 🎉</button>
      
      <p id="errorMsg"></p>
      
      <small style="margin-top: 1.5rem; display: block; color: #c8ffdd; font-size: 1rem;">
        Hint: embelsira jote e preferuar
      </small>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <h1>Gëzuar Ditëlindjen Eliii!</h1>
  
  <button id="surpriseBtn">🎁</button>
  
  <div id="message">
    <p id="typed"></p>
  </div>

  <!-- AUDIO -->
  <audio id="music" loop preload="auto">
    <source src="song.mp3" type="audio/mpeg">
    Shfletuesi yt nuk e mbështet audio-n.
  </audio>

  <script>
    const faLink = document.createElement('link');
    faLink.rel = 'stylesheet';
    faLink.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css';
    document.head.appendChild(faLink);

    const correctPassword = "trilece";

    function checkPassword() {
      const input = document.getElementById('passwordInput').value.trim().toLowerCase();
      const errorMsg = document.getElementById('errorMsg');
      
      if (input === correctPassword) {
        document.getElementById('passwordScreen').style.opacity = '0';
        setTimeout(() => {
          document.getElementById('passwordScreen').style.display = 'none';
          startMusic();
        }, 600);
      } else {
        errorMsg.textContent = "❌ Fjalëkalim i gabuar! Provo përsëri 💚";
        const box = document.querySelector('.password-box');
        box.style.animation = 'shake 0.4s';
        setTimeout(() => box.style.animation = '', 400);
      }
    }

    document.getElementById('passwordInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') checkPassword();
    });

    const style = document.createElement('style');
    style.innerHTML = `@keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }`;
    document.head.appendChild(style);

    const music = document.getElementById('music');

    function startMusic() {
      music.volume = 0;
      music.play()
        .then(() => {
          let vol = 0;
          const fade = setInterval(() => {
            vol += 0.08;
            if (vol >= 1) {
              vol = 1;
              clearInterval(fade);
            }
            music.volume = vol;
          }, 80);
        })
        .catch(() => {});
    }

    window.addEventListener('load', () => { startMusic(); });

    const btn = document.getElementById("surpriseBtn");
    const messageDiv = document.getElementById("message");
    const typed = document.getElementById("typed");

    const fullText = 'TE UROJ GJITHE TE MIRAT NE DITELINDJEN TENDE DHE SHPRESOJ QE PO JA KALON MIR! DOJA TE TE THOJA QE KE QEN SHOQJA IME ME MIRE NE BOTE DHE DUA TE TE THEM SA SHUME DO TE THOTE PER MUA. TE DUA SHUME DHE JAM SHUME ME FAT QE TE KAM NE JETEN TIME, DHE FALEMINDERIT QE ME KE MBESHTETUR KUDO DHE CDO HER. SHPRESOJ QE TE JEMI SA ME MIR!!!';

    let index = 0;

    function typeWriter() {
      if (index < fullText.length) {
        if (fullText.charAt(index) === '\n') typed.innerHTML += '<br>';
        else typed.innerHTML += fullText.charAt(index);
        index++;
        setTimeout(typeWriter, 75);
      }
    }

    btn.onclick = () => {
      btn.style.display = "none";        /* disappears after one click */
      messageDiv.style.display = "block";
      typed.innerHTML = '';
      index = 0;
      typeWriter();
      
      if (music.paused) startMusic();
    };

    music.addEventListener('error', () => {
      console.log("song.mp3 nuk u gjet – sigurohu që është në të njëjtën dosje");
    });

    /* === COUNTDOWN WITH BLACK BACKGROUND (only this was added) === */
    const countdownScreen = document.getElementById("countdownScreen");
    const countdownEl = document.getElementById("countdown");

    const target = new Date();
    target.setMonth(3);
    target.setDate(16);
    target.setHours(0,0,0,0);

    function updateCountdown() {
      const now = new Date();
      const diff = target - now;

      if (diff <= 0) {
        countdownScreen.style.display = "none";
        document.getElementById('passwordScreen').style.display = 'flex';
        return;
      }

      const d = Math.floor(diff / (1000*60*60*24));
      const h = Math.floor((diff/(1000*60*60))%24);
      const m = Math.floor((diff/(1000*60))%60);
      const s = Math.floor((diff/1000)%60);

      countdownEl.innerHTML = `${d}d ${h}h ${m}m ${s}s`;
    }

    window.addEventListener('load', () => {
      document.getElementById('passwordScreen').style.display = 'none';
      countdownScreen.style.display = 'flex';
      updateCountdown();
      setInterval(updateCountdown, 1000);
    });
  </script>
</body>
</html>
